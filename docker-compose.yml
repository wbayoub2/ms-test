services:
  postgres:
    image: postgres:16
    container_name: ms-test-postgres
    environment:
      POSTGRES_DB: ms_test
      POSTGRES_USER: ms_test
      POSTGRES_PASSWORD: ms_test
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ms_test -d ms_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ms-test-postgres-data:/var/lib/postgresql/data

  ms-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-test-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MS_TEST_DB_HOST: postgres
      MS_TEST_DB_PORT: 5432
      MS_TEST_DB_NAME: ms_test
      MS_TEST_DB_USER: ms_test
      MS_TEST_DB_PASSWORD: ms_test
      MS_TEST_MS_INFRA_ENABLED: ${MS_TEST_MS_INFRA_ENABLED:-false}
      MS_TEST_MS_INFRA_BASE_URL: ${MS_TEST_MS_INFRA_BASE_URL:-http://host.docker.internal:18081}
      MS_TEST_MS_INFRA_COOKIE: ${MS_TEST_MS_INFRA_COOKIE:-}
      MS_TEST_MS_INFRA_AUTHORIZATION: ${MS_TEST_MS_INFRA_AUTHORIZATION:-}
      MS_TEST_MS_INFRA_SESSION_ID: ${MS_TEST_MS_INFRA_SESSION_ID:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18092:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  ms-test-postgres-data:
