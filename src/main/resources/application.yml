logging:
  level:
    root: INFO

server:
  port: 8080

spring:
  application:
    name: ms-test
  boot:
    admin:
      client:
        enabled: ${SPRING_BOOT_ADMIN_CLIENT_ENABLED:false}
        url: ${SPRING_BOOT_ADMIN_CLIENT_URL:http://localhost:8089}
  datasource:
    url: jdbc:h2:mem:ms_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

mstest:
  integration:
    mode: BACKEND
    includeAdvisoryText: false
  persistence:
    mode: MEMORY
  step-validation:
    diffPolicy: ALLOW_SYNTHETIC_FALLBACK
    impactPolicy: ALLOW_DEFAULT_FALLBACK
  msinfra:
    enabled: false
    baseUrl: http://127.0.0.1:18081
    authorization: ""
    sessionId: ""
    connectTimeoutMs: 1500
    readTimeoutMs: 3000
    maxAttempts: 2
    retryDelayMs: 300

machine:
  common:
    sba:
      service-group: machine-ms
