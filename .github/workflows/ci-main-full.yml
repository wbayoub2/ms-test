name: CI Main Full

on:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-main-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-tests:
    uses: ./.github/workflows/run-tests.yml
    with:
      scope: all
      with_sonar: false

  emit-ci-event:
    if: always()
    needs: [full-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Build payload
        run: |
          if [ "${{ needs.full-tests.result }}" = "success" ]; then
            status="ci_main_full_passed"
            failed='[]'
            prev_conclusion="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ github.token }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/ci-main-full.yml/runs?branch=${{ github.ref_name }}&status=completed&per_page=1" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); runs=d.get('workflow_runs') or []; print((runs[0].get('conclusion') or '') if runs else '')" || true)"
            if [ "${prev_conclusion}" = "failure" ]; then
              status="ci_main_full_recovered"
            fi
          else
            status="ci_main_full_failed"
            failed='["full-tests"]'
          fi
          cat > payload.json <<JSON
          {
            "repo": "${{ github.event.repository.name }}",
            "sha": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "workflow": "ci-main-full.yml",
            "status": "${status}",
            "failed_jobs": ${failed},
            "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "timestamp": "${{ github.event.head_commit.timestamp || github.run_id }}"
          }
          JSON

      - name: Emit repository dispatch
        env:
          GH_TOKEN: ${{ secrets.ORG_CI_EVENTS_PAT }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "ORG_CI_EVENTS_PAT not configured; skip emit" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          event_type="$(python3 -c "import json;print(json.load(open('payload.json'))['status'])")"
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/${{ github.repository_owner }}/ms-infra/dispatches \
            -d @- <<JSON
          {
            "event_type": "${event_type}",
            "client_payload": $(cat payload.json)
          }
          JSON
